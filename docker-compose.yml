services:
  postgres:
    image: postgres:16

    container_name: postgres-db

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1353
      POSTGRES_DB: hackathon

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    restart: unless-stopped


  api:
    build: .
    container_name: hackathon-api

    volumes:
      - .:/app

    ports:
      - "8000:8000"

    env_file:
      - .env

    depends_on:
      - postgres

volumes:
  postgres_data: